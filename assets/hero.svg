<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Claude Operator Stack — 7 products · 4 months · 1 person">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#161821"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="rowAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1d2a"/>
      <stop offset="1" stop-color="#0f1119"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2330" stroke-width="1"/>
    </pattern>
    <style>
      /* 10s loop, six beats. Compositor-friendly properties only. */
      .tree-line { opacity: 0; animation: treeLine 10s infinite ease-out; }
      .tree-line.l1 { animation-delay: 0s; }
      .tree-line.l2 { animation-delay: 0.25s; }
      .tree-line.l3 { animation-delay: 0.5s; }
      .tree-line.l4 { animation-delay: 0.75s; }
      .tree-line.l5 { animation-delay: 1.0s; }
      @keyframes treeLine {
        0%   { opacity: 0; }
        10%  { opacity: 0; }
        15%  { opacity: 1; }
        80%  { opacity: 1; }
        100% { opacity: 0; }
      }

      .row-accent {
        opacity: 0;
        transform: translateY(0);
        transform-box: fill-box;
        animation: rowAccent 10s infinite cubic-bezier(0.16, 1, 0.3, 1);
      }
      @keyframes rowAccent {
        0%   { opacity: 0; transform: translateY(0); }
        15%  { opacity: 0; transform: translateY(0); }
        25%  { opacity: 1; transform: translateY(0); }
        65%  { opacity: 1; transform: translateY(0); }
        80%  { opacity: 1; transform: translateY(60px); }
        90%  { opacity: 1; transform: translateY(60px); }
        100% { opacity: 0; transform: translateY(60px); }
      }

      .read-caret {
        opacity: 0;
        animation: readCaret 10s infinite step-end;
      }
      @keyframes readCaret {
        0%   { opacity: 0; }
        18%  { opacity: 0; }
        20%  { opacity: 1; }
        24%  { opacity: 0; }
        28%  { opacity: 1; }
        30%  { opacity: 0; }
        100% { opacity: 0; }
      }

      .note-panel {
        opacity: 0;
        transform: translateX(60px);
        transform-box: fill-box;
        animation: notePanel 10s infinite ease-out;
      }
      @keyframes notePanel {
        0%   { opacity: 0; transform: translateX(60px); }
        30%  { opacity: 0; transform: translateX(60px); }
        50%  { opacity: 1; transform: translateX(0); }
        65%  { opacity: 1; transform: translateX(0); }
        80%  { opacity: 0; transform: translateX(0); }
        100% { opacity: 0; transform: translateX(60px); }
      }

      .ship-check {
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        opacity: 0;
        animation: shipCheck 10s infinite ease-out;
      }
      @keyframes shipCheck {
        0%   { stroke-dashoffset: 40; opacity: 0; }
        50%  { stroke-dashoffset: 40; opacity: 0; }
        55%  { stroke-dashoffset: 40; opacity: 1; }
        65%  { stroke-dashoffset: 0;  opacity: 1; }
        78%  { stroke-dashoffset: 0;  opacity: 1; }
        85%  { stroke-dashoffset: 0;  opacity: 0; }
        100% { stroke-dashoffset: 0;  opacity: 0; }
      }

      .shipped-tag {
        opacity: 0;
        animation: shippedTag 10s infinite ease-out;
      }
      @keyframes shippedTag {
        0%   { opacity: 0; }
        58%  { opacity: 0; }
        65%  { opacity: 1; }
        78%  { opacity: 1; }
        85%  { opacity: 0; }
        100% { opacity: 0; }
      }

      .loading-dot {
        animation: dotPulse 1.4s infinite ease-in-out;
      }
      .loading-dot.d1 { animation-delay: 0s; }
      .loading-dot.d2 { animation-delay: 0.2s; }
      .loading-dot.d3 { animation-delay: 0.4s; }
      @keyframes dotPulse {
        0%, 60%, 100% { opacity: 0.25; }
        30%           { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .tree-line, .row-accent, .read-caret, .note-panel,
        .ship-check, .shipped-tag, .loading-dot {
          animation: none !important;
        }
        .tree-line { opacity: 1; }
        .row-accent { opacity: 1; transform: translateY(0); }
        .read-caret { opacity: 1; }
        .note-panel { opacity: 1; transform: translateX(0); }
        .ship-check { stroke-dashoffset: 0; opacity: 1; }
        .shipped-tag { opacity: 1; }
        .loading-dot { opacity: 1; }
      }
    </style>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)" opacity="0.6"/>

  <!-- accent bar top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- prompt-style marker -->
  <text x="80" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#22d3ee" font-weight="500">$ claude --operator</text>

  <!-- title -->
  <text x="80" y="178" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="52" fill="#f4f4f5" font-weight="700" letter-spacing="-1">Claude Operator Stack</text>

  <!-- subtitle -->
  <text x="80" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="16" fill="#a1a1aa">A curator's toolkit + the operator playbook for solo founders</text>

  <!-- stat row -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#e4e4e7">
    <text x="80" y="288">7 products</text>
    <text x="220" y="288" fill="#52525b">·</text>
    <text x="240" y="288">4 months</text>
    <text x="370" y="288" fill="#52525b">·</text>
    <text x="390" y="288">0 funding</text>
    <text x="520" y="288" fill="#52525b">·</text>
    <text x="540" y="288">0 team</text>
    <text x="635" y="288" fill="#52525b">·</text>
    <text x="655" y="288">1 person</text>
  </g>

  <!-- ============================== -->
  <!-- Right-half: operator-loop animation panel (x=740..1260) -->
  <!-- ============================== -->
  <g id="loop-panel" transform="translate(740, 60)">
    <!-- subtle frame around the panel area -->
    <rect x="0" y="0" width="520" height="240" rx="6" ry="6"
          fill="none" stroke="#1f2330" stroke-width="1" opacity="0.6"/>

    <!-- directory tree header -->
    <text x="16" y="28" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#52525b" class="tree-line l1">
      <tspan>~/Projects/</tspan>
      <!-- SMIL fallback in case <style> is stripped by the renderer -->
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.10;0.15;0.80;1"
               dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- accent highlight that slides between row positions (beat 2 -> beat 5).
         Initial y=50 sits under marketplace.md row; +60 sits under saas-kit.md row. -->
    <rect x="6" y="50" width="280" height="22" rx="3" ry="3"
          fill="url(#rowAccent)" class="row-accent">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.15;0.25;0.90;1"
               dur="10s" repeatCount="indefinite"/>
    </rect>

    <!-- directory tree lines -->
    <text x="16" y="66" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" fill="#e4e4e7" class="tree-line l2">
      <tspan fill="#52525b">├──</tspan>
      <tspan dx="6" fill="#22d3ee">marketplace.md</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.125;0.175;0.80;1"
               dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- read caret: a small green pip blinking next to marketplace.md during beat 2 -->
    <rect x="200" y="56" width="8" height="14" fill="#22c55e" class="read-caret"/>

    <text x="16" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" fill="#e4e4e7" class="tree-line l3">
      <tspan fill="#52525b">├──</tspan>
      <tspan dx="6">saas-kit.md</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.15;0.20;0.80;1"
               dur="10s" repeatCount="indefinite"/>
    </text>

    <text x="16" y="118" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" fill="#e4e4e7" class="tree-line l4">
      <tspan fill="#52525b">└──</tspan>
      <tspan dx="6">pipeline.md</tspan>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.175;0.225;0.80;1"
               dur="10s" repeatCount="indefinite"/>
    </text>

    <!-- ============================== -->
    <!-- Project note panel (slides in beat 3, fades out beat 5) -->
    <!-- ============================== -->
    <g class="note-panel">
      <!-- SMIL fallback for opacity if <style> is stripped -->
      <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.30;0.50;0.78;0.85;1"
               dur="10s" repeatCount="indefinite"/>

      <rect x="300" y="38" width="210" height="120" rx="6" ry="6"
            fill="url(#panelBg)" stroke="#22d3ee" stroke-width="1" stroke-opacity="0.35"/>

      <!-- title row -->
      <text x="312" y="60" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="14" fill="#f4f4f5" font-weight="700">
        <tspan fill="#52525b"># </tspan><tspan fill="#22d3ee">marketplace</tspan>
      </text>

      <!-- frontmatter-ish lines -->
      <text x="312" y="84" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#a1a1aa">
        <tspan fill="#7c3aed">status:</tspan>
        <tspan dx="6" fill="#e4e4e7">shipping</tspan>
      </text>

      <text x="312" y="106" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#a1a1aa">
        <tspan fill="#7c3aed">next:</tspan>
        <tspan dx="6" fill="#e4e4e7">stripe-connect</tspan>
      </text>

      <text x="312" y="128" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="12" fill="#a1a1aa">
        <tspan fill="#7c3aed">notes:</tspan>
        <tspan dx="6" fill="#e4e4e7">webhook + idempotency</tspan>
      </text>

      <!-- shipped check + tag (beat 4) -->
      <g class="ship-check" stroke="#22c55e" stroke-width="2" fill="none"
         stroke-linecap="round" stroke-linejoin="round">
        <path d="M 460 100 l 5 5 l 10 -12"/>
      </g>

      <g class="shipped-tag">
        <rect x="445" y="90" width="56" height="20" rx="4" ry="4"
              fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-opacity="0.5" stroke-width="1"/>
        <text x="473" y="104" text-anchor="middle"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="10" fill="#22c55e" font-weight="700">shipped</text>
      </g>
    </g>
  </g>

  <!-- loading dots (left half, near stat row baseline) -->
  <g>
    <circle cx="84"  cy="326" r="5" fill="#22c55e" class="loading-dot d1">
      <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.3;1"
               dur="1.4s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle cx="104" cy="326" r="5" fill="#22c55e" class="loading-dot d2">
      <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.3;1"
               dur="1.4s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="124" cy="326" r="5" fill="#22c55e" class="loading-dot d3">
      <animate attributeName="opacity" values="0.25;1;0.25" keyTimes="0;0.3;1"
               dur="1.4s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- corner mark -->
  <text x="1200" y="332" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#52525b">v0.1.0 · MIT</text>

  <!-- accent bar bottom -->
  <rect x="0" y="357" width="1280" height="3" fill="url(#accent)"/>
</svg>
