<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" width="1280" height="360" role="img" aria-label="Claude Operator Stack — 7 products · 4 months · 1 person">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#161821"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2330" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="360" fill="url(#bg)"/>
  <rect width="1280" height="360" fill="url(#grid)" opacity="0.6"/>

  <!-- accent bar top -->
  <rect x="0" y="0" width="1280" height="3" fill="url(#accent)"/>

  <!-- prompt-style marker -->
  <text x="80" y="92" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20" fill="#22d3ee" font-weight="500">$ claude --operator</text>

  <!-- title -->
  <text x="80" y="178" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="64" fill="#f4f4f5" font-weight="700" letter-spacing="-1">Claude Operator Stack</text>

  <!-- subtitle -->
  <text x="80" y="226" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="22" fill="#a1a1aa">A curator's toolkit + the operator playbook for solo founders</text>

  <!-- stat row -->
  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#e4e4e7">
    <text x="80" y="288">7 products</text>
    <text x="220" y="288" fill="#52525b">·</text>
    <text x="240" y="288">4 months</text>
    <text x="370" y="288" fill="#52525b">·</text>
    <text x="390" y="288">0 funding</text>
    <text x="520" y="288" fill="#52525b">·</text>
    <text x="540" y="288">0 team</text>
    <text x="635" y="288" fill="#52525b">·</text>
    <text x="655" y="288">1 person</text>
  </g>

  <!-- caret cursor -->
  <rect x="76" y="316" width="14" height="22" fill="#22c55e">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- corner mark -->
  <text x="1200" y="332" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14" fill="#52525b">v0.1.0 · MIT</text>

  <!-- accent bar bottom -->
  <rect x="0" y="357" width="1280" height="3" fill="url(#accent)"/>
</svg>
