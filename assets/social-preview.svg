<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1280" width="1280" height="1280">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#161821"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1f2330" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Full-square background (will get center-cropped to 1280x640 by sips) -->
  <rect width="1280" height="1280" fill="url(#bg)"/>
  <rect width="1280" height="1280" fill="url(#grid)" opacity="0.6"/>

  <!-- ==================================== -->
  <!-- All content lives in y=320..960     -->
  <!-- (center-crop band of the 1280x1280)  -->
  <!-- ==================================== -->
  <g transform="translate(0, 320)">

    <!-- Top accent bar (at y=320 absolute) -->
    <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>
    <!-- Bottom accent bar (at y=954 absolute) -->
    <rect x="0" y="634" width="1280" height="6" fill="url(#accent)"/>

    <!-- Prompt -->
    <text x="100" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="28" fill="#22d3ee" font-weight="500">$ claude --operator</text>

    <!-- Title (two lines for vertical balance) -->
    <text x="100" y="180" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="76" fill="#f4f4f5" font-weight="700" letter-spacing="-2">Claude Operator</text>
    <text x="100" y="260" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="76" fill="#f4f4f5" font-weight="700" letter-spacing="-2">Stack</text>

    <!-- Tagline -->
    <text x="100" y="320" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="24" fill="#a1a1aa">A curator's toolkit + operator playbook for solo founders</text>

    <!-- Stat row -->
    <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="32" fill="#e4e4e7" font-weight="500">
      <text x="100" y="440">7 products</text>
      <text x="280" y="440" fill="#52525b">·</text>
      <text x="305" y="440">4 months</text>
      <text x="475" y="440" fill="#52525b">·</text>
      <text x="500" y="440">1 person</text>
    </g>

    <!-- Right-side mock panel: operator loop -->
    <g transform="translate(820, 130)">
      <rect x="0" y="0" width="380" height="320" rx="10" ry="10" fill="none"
            stroke="#1f2330" stroke-width="2" opacity="0.7"/>

      <!-- Directory tree -->
      <text x="24" y="42" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="20" fill="#52525b">~/Projects/</text>
      <text x="24" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="20" fill="#22d3ee">├── marketplace.md</text>
      <text x="24" y="112" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="20" fill="#e4e4e7">├── saas-kit.md</text>
      <text x="24" y="144" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="20" fill="#e4e4e7">└── pipeline.md</text>

      <!-- Project note frontmatter -->
      <line x1="24" y1="180" x2="356" y2="180" stroke="#1f2330" stroke-width="1"/>

      <text x="24" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#7c3aed">status:</text>
      <text x="130" y="212" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#22c55e" font-weight="700">shipping</text>

      <text x="24" y="244" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#7c3aed">next:</text>
      <text x="130" y="244" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#e4e4e7">stripe-connect</text>

      <text x="24" y="276" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#7c3aed">notes:</text>
      <text x="130" y="276" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="18" fill="#e4e4e7">webhook + idempotency</text>

      <!-- Shipped tag, bottom-right of mock -->
      <g transform="translate(295, 290)">
        <rect x="0" y="0" width="68" height="22" rx="4" ry="4"
              fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-opacity="0.5"/>
        <text x="34" y="16" text-anchor="middle"
              font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
              font-size="12" fill="#22c55e" font-weight="700">shipped</text>
      </g>
    </g>

    <!-- Footer corner mark -->
    <text x="1180" y="600" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="22" fill="#52525b">@mccarthy606 · v1.0.0 · MIT</text>

  </g>
</svg>
