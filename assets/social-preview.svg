<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#161821"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c3aed"/>
      <stop offset="0.5" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#1f2330" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#grid)" opacity="0.6"/>

  <rect x="0" y="0" width="1280" height="6" fill="url(#accent)"/>
  <rect x="0" y="634" width="1280" height="6" fill="url(#accent)"/>

  <text x="100" y="160" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="28" fill="#22d3ee" font-weight="500">$ claude --operator</text>

  <text x="100" y="280" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="80" fill="#f4f4f5" font-weight="700" letter-spacing="-2">Claude Operator</text>
  <text x="100" y="370" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="80" fill="#f4f4f5" font-weight="700" letter-spacing="-2">Stack</text>

  <text x="100" y="440" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="26" fill="#a1a1aa">A curator's toolkit + operator playbook for solo founders</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="32" fill="#e4e4e7" font-weight="500">
    <text x="100" y="540">7 products</text>
    <text x="280" y="540" fill="#52525b">·</text>
    <text x="305" y="540">4 months</text>
    <text x="475" y="540" fill="#52525b">·</text>
    <text x="500" y="540">1 person</text>
  </g>

  <text x="1180" y="600" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="22" fill="#52525b">@mccarthy606 · v1.0.0 · MIT</text>

  <g transform="translate(900, 200)">
    <rect x="0" y="0" width="280" height="280" rx="8" ry="8" fill="none"
          stroke="#1f2330" stroke-width="2" opacity="0.7"/>
    <text x="20" y="40" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="18" fill="#52525b">~/Projects/</text>
    <text x="20" y="80" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="18" fill="#22d3ee">├── marketplace.md</text>
    <text x="20" y="110" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="18" fill="#e4e4e7">├── saas-kit.md</text>
    <text x="20" y="140" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="18" fill="#e4e4e7">└── pipeline.md</text>
    <text x="20" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="16" fill="#7c3aed">status:</text>
    <text x="120" y="200" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="16" fill="#22c55e" font-weight="700">shipping</text>
    <text x="20" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="16" fill="#7c3aed">next:</text>
    <text x="120" y="230" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="16" fill="#e4e4e7">stripe-connect</text>
    <g transform="translate(220, 245)">
      <rect x="-20" y="-15" width="56" height="20" rx="4" ry="4"
            fill="#22c55e" fill-opacity="0.18" stroke="#22c55e" stroke-opacity="0.5"/>
      <text x="8" y="0" text-anchor="middle"
            font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#22c55e" font-weight="700">shipped</text>
    </g>
  </g>
</svg>
